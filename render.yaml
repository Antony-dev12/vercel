# Render Blueprint — Digital Presence Tracker
# Deploys: PostgreSQL DB + Node.js backend + React frontend (static site)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: radabiz-db
    plan: free          # 90-day free PostgreSQL on Render
    databaseName: radabiz_db
    user: radabiz_user

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: radabiz-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    healthCheckPath: /health

    envVars:
      # Database — auto-wired from the DB above
      - key: DATABASE_URL
        fromDatabase:
          name: radabiz-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: radabiz-db
          property: connectionString

      - key: NODE_ENV
        value: production

      # Security keys — auto-generated at first deploy
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

      # AES-256 key for OAuth token encryption — 64 hex chars (32 bytes)
      # Not used since OAuth is disabled, but required by the import
      - key: TOKEN_ENCRYPTION_KEY
        value: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2

      # ⚠️  Set these MANUALLY in Render dashboard after first deploy:
      #     FRONTEND_URL  →  your frontend Render URL  e.g. https://radabiz-app.onrender.com
      #     BACKEND_URL   →  your backend Render URL   e.g. https://radabiz-api.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false

  # ── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: radabiz-app
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    # SPA routing — send all paths to index.html so React Router handles them
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # ⚠️  Set this MANUALLY in Render dashboard after the backend is deployed:
      #     VITE_API_URL  →  your backend URL  e.g. https://radabiz-api.onrender.com
      - key: VITE_API_URL
        sync: false
